name: Backend CI/CD Pipeline

on:
  push:
    branches: ["main"]

env:
  IMAGE_NAME: backend-app

jobs:
  build:
    runs-on: self-hosted

    steps:
      # 📥 Checkout
      - name: Checkout Code
        uses: actions/checkout@v4

      # 🟢 Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
      

      # 📦 Install Dependencies
      - name: Install Dependencies
        run: npm ci

      # 🔐 Gitleaks scan
      - name: Gitleaks scan
        run: gitleaks detect --source . --no-git

      # 🐳 Docker login (FIXED ❗)
      - name: Docker login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 🐳 Build Docker image (FIXED ❗)
      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ github.sha }} .

      # 🔍 Trivy scan
      - name: Scan Docker image
        run: trivy image --scanners vuln ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ github.sha }}

      # 🚀 Push image
      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ github.sha }}

      # ❌ REMOVE KUBECONFIG (you are using KIND)
      # No need for this step

      # 🔄 Update deployment
      - name: Update Deployment Image
        run: |
          sed -i "s|IMAGE_PLACEHOLDER|${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ github.sha }}|g" k8s/backend-deployment.yaml

      # ☸️ Deploy
      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/backend-deployment.yaml
          kubectl apply -f k8s/backend-service.yaml

      # ✅ Verify
      - name: Verify Deployment
        run: |
          kubectl get pods
          kubectl get deployment
          kubectl get svc
