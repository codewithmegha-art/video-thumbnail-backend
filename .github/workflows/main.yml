name: Backend CI/CD Pipeline

on:
  push:
    branches: ["main"]

env:
  IMAGE_NAME: backend-app

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4

      - name: Install Dependencies
        run: npm ci

      - name: Gitleaks scan
        run: gitleaks detect --source . --no-git

      - name: Docker login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ github.sha }} .

      # 🔥 IMPORTANT STEP FOR KIND
      - name: Load image into KIND
        run: kind load docker-image ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ github.sha }}

      - name: Scan Docker image
        run: trivy image --scanners vuln ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ github.sha }}

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ github.sha }}

      - name: Update Deployment Image
        run: |
          sed -i "s|IMAGE_PLACEHOLDER|${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ github.sha }}|g" k8s/backend-deployment.yaml
          cat k8s/backend-deployment.yaml

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/backend-deployment.yaml
          kubectl apply -f k8s/backend-service.yaml

      - name: Verify Deployment
        run: |
          kubectl get pods
          kubectl get deployment
          kubectl get svc
