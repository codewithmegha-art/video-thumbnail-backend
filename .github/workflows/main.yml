name: Backend CI/CD Pipeline

on: 
  push: 
    branches: ['main']  

env:
  IMAGE_NAME: backend-app

jobs:
  compile: 
     runs-on: self-hosted 

     steps:
       - name: Checkout Code
         uses: actions/checkout@v4 

       - name: Setup  Node
         uses: actions/setup-node@v4

       - name: Install Dependancies
         run : npm ci 

       - name: Build the app
         run : npm run build 

       - name: Gitleaks scan
         run: gitleaks detect --source . --no-git

       - name: Docker login
         run: Docker login -u "{{ secrets.DOCKER_USERNAME }}" --password-stdin 

       - name: Build the docker image 
         run: docker build -t  {{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ github.sha }} .

       - name: Scan the docker image
         run: trivy image --scanners vuln ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ github.sha }}

       - name: Push Docker Image 
         run: docker push  {{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ github.sha }}  

       - name: Set Kubeconfig
         run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config

       - name: Update Deployment Image
         run: |
           sed -i "s|IMAGE_PLACEHOLDER|${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ github.sha }}|g" k8s/backend-deployment.yaml


       - name: Deploy to Kubernetes
         run : |
          kubectl apply -f k8s/backend-deployment.yaml
          kubectl apply -f k8s/backend-service.yaml

       - name: Verify Deployment
         run: |
           kubectl get pods 
           kubectl get deployment 
           kubectl get svc

          
         



        

        
    
